services:
  postgres:
    image: postgres:16-alpine
    container_name: vision_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-run schema + seed on FIRST init only (empty data volume). Postgres
      # ignores this dir once pgdata is already populated, so re-deploys and
      # already-seeded hosts are untouched.
      - ./db/setup.sql:/docker-entrypoint-initdb.d/10-setup.sql:ro
    networks:
      - vision_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:

networks:
  vision_network:
    external: true
