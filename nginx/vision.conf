# VisionTemplate vhost for vson.ghlensui.xyz.
# deploy.sh manages the active Blue-Green upstream in:
# /etc/nginx/conf.d/vision_upstream.conf
# That file must define:
# upstream vision_backend { server 127.0.0.1:3000; }
# or:
# upstream vision_backend { server 127.0.0.1:3001; }

server {
    listen 80;
    server_name vson.ghlensui.xyz;

    location / {
        proxy_pass http://vision_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# After DNS points at VPS_HOST_IP and this port-80 vhost is installed, run:
# certbot --nginx -d vson.ghlensui.xyz
#
# Certbot will provision certificate files, add a managed 443 TLS server block,
# and normally add an HTTP-to-HTTPS redirect for this domain. Do not add manual
# certificate paths before Certbot creates them.
