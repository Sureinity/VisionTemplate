# VisionTemplate vhost for vson.ghlensui.xyz (TLS).
#
# The active Blue-Green backend is managed by deploy.sh in:
#   /etc/nginx/conf.d/vision_upstream.conf
# which defines one of:
#   upstream vision_backend { server 127.0.0.1:3000; }   # green
#   upstream vision_backend { server 127.0.0.1:3001; }   # blue
#
# This vhost references Let's Encrypt certificate paths. deploy.sh only installs
# it once the certificate exists (see the cert guard in deploy.sh); on a brand-new
# host, obtain the cert first — see DEPLOYMENT.md "First-time TLS bootstrap".

server {
    listen 80;
    server_name vson.ghlensui.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vson.ghlensui.xyz;

    ssl_certificate     /etc/letsencrypt/live/vson.ghlensui.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vson.ghlensui.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://vision_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
